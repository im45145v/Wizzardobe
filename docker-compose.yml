version: '3.8'

services:
  mongo:
    image: mongo:7.0
    container_name: wizzardobe-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - wizzardobe-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wizzardobe-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/wizzardobe
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-changeme_super_secret_jwt_key}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-changeme_super_secret_refresh_key}
      MASTER_ENCRYPTION_KEY: ${MASTER_ENCRYPTION_KEY:-aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:5000/api/calendar/callback}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - wizzardobe-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wizzardobe-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - wizzardobe-network

networks:
  wizzardobe-network:
    driver: bridge

volumes:
  mongodb_data:
